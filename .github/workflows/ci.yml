name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────
  backend-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Verify Python
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend Tests ───────────────────────────────────
  frontend-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm test

  # ── Docker Build ─────────────────────────────────────
  docker-build:
    runs-on: self-hosted
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Build backend image
        run: docker build -t student-app-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t student-app-frontend:${{ github.sha }} ./frontend

      - name: Verify images
        run: docker images | Select-String "student-app"

      - name: Clean up old images
        run: docker image prune -f

  # ── Deploy ───────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Stop existing containers (preserve volumes)
        run: docker-compose down 2>&1 | Out-Default
        continue-on-error: true

      - name: Start services with fresh build
        run: docker-compose up --build -d 2>&1 | Out-Default

      - name: Wait for services to be healthy
        run: |
          Start-Sleep -Seconds 15
          docker-compose ps

      - name: Verify application health
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:8000/api/health -UseBasicParsing
          if ($response.StatusCode -eq 200) { Write-Host "Backend is healthy" } else { exit 1 }
